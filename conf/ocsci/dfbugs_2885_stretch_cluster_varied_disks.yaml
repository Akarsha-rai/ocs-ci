---
# Configuration overlay for DFBUGS-2885 verification
# Use this with: conf/deployment/vsphere/upi_1az_rhcos_vsan_lso_vmdk_3m_6w_arbiter.yaml
#
# This enables deployment with varied disk sizes to simulate the bug scenario
# where ONE node in zone-2 has disks from a different manufacturer with
# slightly different capacity (e.g., 102GB vs 100GB)

ENV_DATA:
  # Enable varied disk sizes for DFBUGS-2885 testing
  # This will create ONE node in zone-2 with different disk size
  use_varied_disk_sizes_for_stretch: true
  
  # Percentage variation for disk sizes (default: 2%)
  # This simulates real-world scenario where disks from different
  # manufacturers have slight capacity differences
  disk_size_variation_percent: 2.0
  
  # Explicitly mark this as DFBUGS-2885 testing
  test_dfbugs_2885: true

